---
layout: hacker/default
---

<style>
/* ========== 主题颜色变量 ========== */
/* 暗色模式（默认） */
:root,
[data-theme="dark"] {
  --bg-color: #0a0a0a;
  --text-color: #e0e0e0;
  --link-color: #0f0;
  --link-hover: #ffcc00;
  --nav-bg: rgba(10, 10, 10, 0.4);
  --border-color: #333;
}

/* 亮色模式 */
[data-theme="light"] {
  --bg-color: #f5f5f5;
  --text-color: #222;
  --link-color: #0066cc;
  --link-hover: #ff6600;
  --nav-bg: rgba(245, 245, 245, 0.9);
  --border-color: #ddd;
}

/* 全局样式 */
body {
  background-color: var(--bg-color);
  color: var(--text-color);
  transition: background-color 0.3s ease, color 0.3s ease;
}

a {
  color: var(--link-color);
  transition: color 0.2s ease;
}

a:hover {
  color: var(--link-hover);
}

/* 导航栏样式 - 改为 flex 布局，左右分布 */
.navbar {
  position: sticky;
  top: 0;
  background-color: var(--nav-bg);
  backdrop-filter: blur(4px);
  z-index: 99;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 20px;
  margin-bottom: 20px;
  border-bottom: 1px solid var(--border-color);
}

/* 导航链接容器 */
.nav-links {
  display: flex;
  gap: 20px;
}

.nav-links a {
  text-decoration: none;
  font-size: 1.2rem;
}

/* 导航栏内的主题切换按钮 */
.navbar-theme-btn {
  background: rgba(0, 0, 0, 0.3);
  border: 1px solid var(--border-color);
  color: var(--link-color);
  padding: 6px 12px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 1rem;
  transition: all 0.2s ease;
}

.navbar-theme-btn:hover {
  background-color: rgba(0, 255, 0, 0.2);
  transform: scale(1.02);
}

/* 一言模块样式 */
.hitokoto-box {
  text-align: center;
  margin: 20px auto;
  padding: 10px 20px;
  max-width: 600px;
  font-size: 0.9rem;
  color: var(--text-color);
  opacity: 0.8;
  border-left: 3px solid var(--link-color);
  border-right: 3px solid var(--link-color);
  background-color: rgba(0, 0, 0, 0.2);
  border-radius: 8px;
}

/* 代码块复制按钮样式 */
.highlight {
  position: relative;
}

.copy-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  background-color: rgba(0, 0, 0, 0.6);
  border: 1px solid var(--link-color);
  color: var(--link-color);
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  font-family: monospace;
  transition: all 0.2s ease;
  z-index: 10;
}

.copy-btn:hover {
  background-color: rgba(0, 255, 0, 0.2);
  color: var(--text-color);
}

.copy-btn.copied {
  border-color: #ffcc00;
  color: #ffcc00;
}
</style>

<!-- 导航栏（带主题切换按钮） -->
<nav class="navbar">
  <div class="nav-links">
    <a href="/bg/">🏠</a>
    <a href="/bg/search/">🔍</a>
    <a href="/bg/about/">📖</a>
  </div>
  <button class="navbar-theme-btn" id="themeToggle" title="切换亮色/暗色模式">🌓</button>
</nav>

<!-- 随机二次元图片（点击换图） -->
<div style="text-align: center; margin: 10px auto;">
  <img id="randomImg" src="" alt="随机图片" style="max-width: 100%; max-height: 200px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); cursor: pointer;">
  <p style="font-size: 12px; color: #888; margin-top: 5px;">✨ 点击图片换一张 ✨</p>
</div>

<script>
// 随机图片功能
const imgElement = document.getElementById('randomImg');

const imgApis = [
  { type: 'json', url: 'https://api.xygeng.cn/img/' },
  { type: 'json', url: 'https://api.btstu.cn/sjbz/api.php?lx=dongman&format=json' },
  { type: 'direct', url: 'https://www.dmoe.cc/random.php' },
  { type: 'direct', url: 'https://img.paulzzh.tech/touhou/random' }
];

const fallbackImages = [
  'https://picsum.photos/id/100/400/200',
  'https://picsum.photos/id/104/400/200',
  'https://picsum.photos/id/106/400/200',
  'https://picsum.photos/id/169/400/200'
];

function useFallbackImage() {
  const randomIndex = Math.floor(Math.random() * fallbackImages.length);
  imgElement.src = fallbackImages[randomIndex];
}

function loadRandomImage() {
  const api = imgApis[Math.floor(Math.random() * imgApis.length)];
  
  if (api.type === 'direct') {
    imgElement.src = api.url + '?t=' + Date.now();
  } else {
    fetch(api.url + '?t=' + Date.now())
      .then(response => response.json())
      .then(data => {
        let imgUrl = '';
        if (api.url.includes('xygeng.cn')) {
          imgUrl = data.img || data.url;
        } else if (api.url.includes('btstu.cn')) {
          imgUrl = data.imgurl;
        }
        if (imgUrl && imgUrl.startsWith('http')) {
          imgElement.src = imgUrl;
        } else {
          useFallbackImage();
        }
      })
      .catch(() => {
        useFallbackImage();
      });
  }
}

imgElement.onerror = function() {
  useFallbackImage();
};

loadRandomImage();
imgElement.addEventListener('click', loadRandomImage);
</script>

<!-- 一言模块 -->
<div class="hitokoto-box">
  <span id="hitokoto_text">加载中...</span>
</div>

<script>
// 一言功能
fetch('https://v1.hitokoto.cn/')
  .then(response => response.json())
  .then(data => {
    const hitokotoSpan = document.getElementById('hitokoto_text');
    if (hitokotoSpan) {
      hitokotoSpan.innerHTML = `「${data.hitokoto}」 — ${data.from}`;
    }
  })
  .catch(error => {
    console.error('一言加载失败:', error);
    const hitokotoSpan = document.getElementById('hitokoto_text');
    if (hitokotoSpan) {
      hitokotoSpan.innerHTML = '「代码就像写诗，简洁即力量」 — 佚名';
    }
  });
</script>

{{ content }}

<!-- 返回顶部按钮 -->
<button onclick="topFunction()" id="backToTop" title="返回顶部" style="display: none; position: fixed; bottom: 30px; right: 30px; z-index: 99; border: 1px solid #666; outline: none; background-color: rgba(0, 0, 0, 0.5); color: #888; cursor: pointer; padding: 12px 16px; border-radius: 8px; font-size: 16px; font-weight: bold; backdrop-filter: blur(4px);">↑ 顶部</button>

<script>
// ========== 主题切换功能（修复电脑点击无反应） ==========
(function() {
  // 获取保存的主题，默认暗色
  const savedTheme = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', savedTheme);
  
  // 获取按钮 - 使用更可靠的选择器
  const themeToggle = document.getElementById('themeToggle');
  
  if (themeToggle) {
    // 设置按钮图标
    const currentTheme = document.documentElement.getAttribute('data-theme');
    themeToggle.textContent = currentTheme === 'dark' ? '🌓' : '🌞';
    
    // 移除可能存在的旧事件，重新绑定
    const newToggle = themeToggle.cloneNode(true);
    themeToggle.parentNode.replaceChild(newToggle, themeToggle);
    
    // 重新获取并绑定事件
    const finalToggle = document.getElementById('themeToggle');
    finalToggle.addEventListener('click', function(e) {
      e.preventDefault();
      const current = document.documentElement.getAttribute('data-theme');
      const newTheme = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      finalToggle.textContent = newTheme === 'dark' ? '🌓' : '🌞';
      
      // 调试日志（可选，用于确认点击生效）
      console.log('主题切换为:', newTheme);
    });
  } else {
    console.error('未找到主题切换按钮');
  }
})();

// ========== 代码复制功能 ==========
(function() {
  const codeBlocks = document.querySelectorAll('.highlight');
  codeBlocks.forEach(function(block) {
    // 避免重复添加按钮
    if (block.querySelector('.copy-btn')) return;
    
    const btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = '复制';
    block.style.position = 'relative';
    block.appendChild(btn);
    
    btn.addEventListener('click', function() {
      const code = block.querySelector('code');
      const text = code ? code.innerText : block.innerText;
      navigator.clipboard.writeText(text).then(function() {
        btn.textContent = '已复制 ✓';
        btn.classList.add('copied');
        setTimeout(function() {
          btn.textContent = '复制';
          btn.classList.remove('copied');
        }, 2000);
      }).catch(function(err) {
        console.error('复制失败:', err);
        btn.textContent = '失败';
        setTimeout(function() {
          btn.textContent = '复制';
        }, 1500);
      });
    });
  });
})();

// ========== 返回顶部功能 ==========
const backToTopBtn = document.getElementById("backToTop");
if (backToTopBtn) {
  window.onscroll = function() {
    if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
      backToTopBtn.style.display = "block";
    } else {
      backToTopBtn.style.display = "none";
    }
  };
}

function topFunction() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
