---
layout: hacker/default
---

<style>
/* ========== 主题颜色变量 ========== */
/* 暗色模式（默认） */
:root,
[data-theme="dark"] {
  --bg-color: #0a0a0a;
  --text-color: #e0e0e0;
  --link-color: #0f0;
  --link-hover: #ffcc00;
  --nav-bg: rgba(10, 10, 10, 0.4);
  --border-color: #333;
}

/* 亮色模式 */
[data-theme="light"] {
  --bg-color: #f5f5f5;
  --text-color: #222;
  --link-color: #0066cc;
  --link-hover: #ff6600;
  --nav-bg: rgba(245, 245, 245, 0.9);
  --border-color: #ddd;
}

/* 全局样式 */
body {
  background-color: var(--bg-color);
  color: var(--text-color);
  transition: background-color 0.3s ease, color 0.3s ease;
}

a {
  color: var(--link-color);
  transition: color 0.2s ease;
}

a:hover {
  color: var(--link-hover);
}

/* 导航栏样式 */
.navbar {
  position: sticky;
  top: 0;
  background-color: var(--nav-bg);
  backdrop-filter: blur(4px);
  z-index: 99;
  text-align: center;
  padding: 12px 0;
  margin-bottom: 30px;
  border-bottom: 1px solid var(--border-color);
}

/* 主题切换按钮样式 */
.theme-switch {
  position: fixed;
  bottom: 90px;
  right: 30px;
  z-index: 99;
  background-color: rgba(0, 0, 0, 0.5);
  border: 1px solid var(--border-color);
  color: var(--link-color);
  padding: 10px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  backdrop-filter: blur(4px);
  transition: all 0.2s ease;
}

.theme-switch:hover {
  background-color: rgba(0, 255, 0, 0.2);
}

/* 代码块复制按钮样式 */
.highlight {
  position: relative;
}

.copy-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  background-color: rgba(0, 0, 0, 0.6);
  border: 1px solid var(--link-color);
  color: var(--link-color);
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  font-family: monospace;
  transition: all 0.2s ease;
  z-index: 10;
}

.copy-btn:hover {
  background-color: rgba(0, 255, 0, 0.2);
  color: var(--text-color);
}

.copy-btn.copied {
  border-color: #ffcc00;
  color: #ffcc00;
}
</style>

<!-- 导航栏 -->
<nav class="navbar">
  <a href="/bg/" style="margin: 0 15px; text-decoration: none;">首页</a>
  <a href="/bg/search/" style="margin: 0 15px; text-decoration: none;">搜索</a>
  <a href="/bg/about/" style="margin: 0 15px; text-decoration: none;">关于</a>
</nav>

<!-- 页面内容 -->
{{ content }}

<!-- 主题切换按钮 -->
<button class="theme-switch" id="themeToggle" title="切换亮色/暗色模式">🌓 主题</button>

<!-- 返回顶部按钮 -->
<button onclick="topFunction()" id="backToTop" title="返回顶部" style="display: none; position: fixed; bottom: 30px; right: 30px; z-index: 99; border: 1px solid #666; outline: none; background-color: rgba(0, 0, 0, 0.5); color: #888; cursor: pointer; padding: 12px 16px; border-radius: 8px; font-size: 16px; font-weight: bold; backdrop-filter: blur(4px);">↑ 顶部</button>

<script>
// ========== 主题切换功能 ==========
(function() {
  // 获取当前保存的主题，默认暗色
  const savedTheme = localStorage.getItem('theme') || 'dark';
  // 应用到页面
  document.documentElement.setAttribute('data-theme', savedTheme);
  
  // 主题切换按钮
  const themeToggle = document.getElementById('themeToggle');
  if (themeToggle) {
    themeToggle.addEventListener('click', function() {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      
      // 可选：更新按钮文字
      themeToggle.textContent = newTheme === 'dark' ? '🌓 主题' : '🌞 主题';
    });
    
    // 根据当前主题设置按钮文字
    const currentTheme = document.documentElement.getAttribute('data-theme');
    themeToggle.textContent = currentTheme === 'dark' ? '🌓 主题' : '🌞 主题';
  }
})();

// ========== 代码复制功能 ==========
(function() {
  var codeBlocks = document.querySelectorAll('.highlight');
  codeBlocks.forEach(function(block) {
    var btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = '复制';
    block.style.position = 'relative';
    block.appendChild(btn);
    btn.addEventListener('click', function() {
      var code = block.querySelector('code');
      var text = code ? code.innerText : block.innerText;
      navigator.clipboard.writeText(text).then(function() {
        btn.textContent = '已复制 ✓';
        btn.classList.add('copied');
        setTimeout(function() {
          btn.textContent = '复制';
          btn.classList.remove('copied');
        }, 2000);
      }).catch(function(err) {
        console.error('复制失败:', err);
        btn.textContent = '失败';
        setTimeout(function() {
          btn.textContent = '复制';
        }, 1500);
      });
    });
  });
})();

// ========== 返回顶部功能 ==========
var mybutton = document.getElementById("backToTop");
window.onscroll = function() {
  if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
    mybutton.style.display = "block";
  } else {
    mybutton.style.display = "none";
  }
};
function topFunction() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
